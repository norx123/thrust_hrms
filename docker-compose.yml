services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo19-db-data:/var/lib/postgresql/data

  web:
    build: .
    image: thrust_hrms-odoo:19.0
    depends_on:
      - db
    ports:
      - "8081:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./addons19:/mnt/extra-addons
      - odoo19-web-data:/var/lib/odoo

volumes:
  odoo19-db-data:
  odoo19-web-data:
  
